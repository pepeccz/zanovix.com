services:
  app:
    build: .
    container_name: zanovix-com
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
    restart: unless-stopped
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"fetch('http://localhost:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # env_file: .env  # descomentar si existe .env local con overrides
